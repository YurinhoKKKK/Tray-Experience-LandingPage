<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#050608" />

    <!-- Favicon derivado do ícone azul da Monvatti -->
    <link rel="icon" type="image/webp" href="/images/monvatti-icon.webp" />
    <link rel="apple-touch-icon" href="/images/monvatti-icon.webp" />

    <!-- SEO primário -->
    <title>Tray Experience | Monvatti + Tray — Evento de e-commerce em Sombrio-SC</title>
    <meta
      name="description"
      content="Evento presencial e gratuito de e-commerce, dia 15 de agosto, em Sombrio-SC, realizado pela Monvatti em parceria com a Tray. Networking, conteúdo e estratégias práticas para quem vende online."
    />
    <meta
      name="keywords"
      content="e-commerce, evento, Tray, Monvatti, Sombrio, marketplace, lojistas, Santa Catarina"
    />
    <meta name="author" content="Monvatti" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://trayexperience.monvatti.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Tray Experience" />
    <meta property="og:locale" content="pt_BR" />
    <meta
      property="og:title"
      content="Tray Experience | Monvatti + Tray — Evento de e-commerce em Sombrio-SC"
    />
    <meta
      property="og:description"
      content="Evento presencial e gratuito de e-commerce, dia 15 de agosto, em Sombrio-SC. Estratégia, escala e networking em um só dia."
    />
    <meta property="og:image" content="/images/tray-experience-logo.webp" />
    <meta property="og:image:alt" content="Logo do evento Tray Experience" />
    <meta property="og:url" content="https://trayexperience.monvatti.com/" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Tray Experience | Monvatti + Tray — Evento de e-commerce em Sombrio-SC"
    />
    <meta
      name="twitter:description"
      content="Evento presencial e gratuito de e-commerce, dia 15 de agosto, em Sombrio-SC. Estratégia, escala e networking em um só dia."
    />
    <meta name="twitter:image" content="/images/tray-experience-logo.webp" />

    <!-- Preload de recursos críticos do hero -->
    <link rel="preload" as="image" href="/images/monvatti-logo.webp" />
    <link rel="preload" as="image" href="/images/tray-logo-white.webp" />

    <!-- JSON-LD Schema.org — Event -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Event",
        "name": "Tray Experience",
        "description": "Evento presencial e gratuito de e-commerce realizado pela Monvatti em parceria com a Tray, com conteúdo prático, especialistas e networking.",
        "startDate": "2026-08-15",
        "eventAttendanceMode": "https://schema.org/OfflineEventAttendanceMode",
        "eventStatus": "https://schema.org/EventScheduled",
        "image": "https://trayexperience.monvatti.com/images/tray-experience-logo.webp",
        "location": {
          "@type": "Place",
          "name": "Sombrio Tênis Clube",
          "address": {
            "@type": "PostalAddress",
            "streetAddress": "Av. Nereu Ramos, 1375 — Centro",
            "addressLocality": "Sombrio",
            "addressRegion": "SC",
            "addressCountry": "BR"
          }
        },
        "organizer": {
          "@type": "Organization",
          "name": "Monvatti",
          "url": "https://monvatti.com"
        },
        "sponsor": {
          "@type": "Organization",
          "name": "Tray",
          "url": "https://www.tray.com.br"
        },
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "BRL",
          "availability": "https://schema.org/InStock",
          "url": "https://trayexperience.monvatti.com/"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
